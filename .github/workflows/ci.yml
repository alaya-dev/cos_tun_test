name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.2', extensions: mbstring, pdo_mysql }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: composer install --no-interaction --prefer-dist
      - run: npm ci
      - run: ./vendor/bin/pint --test
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run check:asset-budgets
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser
      - run: php artisan test
      - run: composer test:coverage
      - run: composer audit
      - run: npm audit --audit-level=high
      - run: if git grep -nE 'AKIA[0-9A-Z]{16}|-----BEGIN .*PRIVATE KEY-----|sk_live_' -- ':!.env.example' ':!.github/workflows/ci.yml'; then echo 'Potential secret detected'; exit 1; fi
      - run: composer check-doc-references
